name: Build PixelPlay APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -alias androiddebugkey \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build payload DEX
        run: |
          ANDROID_JAR="$ANDROID_SDK_ROOT/platforms/android-34/android.jar"
          D8=$(ls "$ANDROID_SDK_ROOT"/build-tools/*/d8 2>/dev/null | head -1)
          if [ -z "$D8" ]; then
            D8=$(ls "$ANDROID_SDK_ROOT"/build-tools/*/dx 2>/dev/null | head -1)
          fi
          PAYLOAD_SRC=payload/src
          PAYLOAD_OUT=payload/classes
          mkdir -p "$PAYLOAD_OUT" payload
          find "$PAYLOAD_SRC" -name "*.java" > payload_sources.txt
          javac -cp "$ANDROID_JAR" -d "$PAYLOAD_OUT" @"payload_sources.txt"
          CLASS_FILES=$(find "$PAYLOAD_OUT" -name "*.class" | tr '\n' ' ')
          if echo "$D8" | grep -q "d8$"; then
            "$D8" --release --output payload/payload.dex $CLASS_FILES
          else
            "$D8" --dex --output=payload/payload.dex $CLASS_FILES
          fi
          echo "Payload DEX size: $(wc -c < payload/payload.dex) bytes"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PixelPlay-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload payload DEX
        uses: actions/upload-artifact@v4
        with:
          name: payload-dex
          path: payload/payload.dex
          if-no-files-found: error
